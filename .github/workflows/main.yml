name: Build and push docker image

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Build the Docker image
      run: docker build -t nodejs-app-image:latest -f Dockerfile .

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Docker tag & push the Docker image
      run: |
        docker tag nodejs-app-image:latest ${{ secrets.DOCKER_USERNAME }}/nodejs-app-image:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/nodejs-app-image:latest
